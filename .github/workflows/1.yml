name: Build KemonoDownloader

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  FEDORA_VERSION: "fc42"

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install toml

      - name: Read version from pyproject.toml
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['briefcase']['version'])")

          if [ -z "$VERSION" ]; then
            echo "Version not found!"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Detected version: $VERSION"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase PyQt6 toml

      - name: Build MSI
        shell: bash
        run: |
          briefcase create
          briefcase build
          briefcase package

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release

          cp \
            dist/KemonoDownloader-${{ needs.prepare.outputs.version }}.msi \
            release/W-KemonoDownloader-${{ needs.prepare.outputs.version }}-x86_64.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: release/*.msi

  release:
    needs:
      - prepare
      - build-windows
      - build-windows-portable
      - build-macos
      - build-linux

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}

          name: KemonoDownloader v${{ needs.prepare.outputs.version }}

          generate_release_notes: true

          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg.tar.zst

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
