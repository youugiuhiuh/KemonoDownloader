name: Build KemonoDownloader

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install toml

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['briefcase']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

  build:
    needs: prepare
    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            type: msi
            artifact: windows-msi

          - os: windows-latest
            type: portable
            artifact: windows-portable

          - os: macos-latest
            type: dmg
            artifact: macos-arm64

          - os: ubuntu-latest
            type: deb
            artifact: linux-deb

          - os: fedora-latest
            type: rpm
            artifact: linux-rpm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ========================
      # Linux system deps
      # ========================
      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            build-essential pkg-config \
            libgtk-3-dev libcairo2-dev libglib2.0-dev \
            gir1.2-gtk-3.0 \
            libpulse-mainloop-glib0 libpulse0 libxcb-xinerama0 mesa-utils \
            rpm fakeroot

      # ========================
      # Python + deps
      # ========================
      - name: Install dependencies
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m pip install --break-system-packages -U pip

            if [[ "${{ matrix.type }}" == "portable" ]]; then
              python3 -m pip install --break-system-packages pyinstaller toml
            else
              python3 -m pip install --break-system-packages briefcase toml PyQt6
            fi
          else
            python -m pip install -U pip

            if [[ "${{ matrix.type }}" == "portable" ]]; then
              pip install pyinstaller toml
            else
              pip install briefcase toml PyQt6
            fi
          fi

      # ========================
      # Portable build
      # ========================
      - name: Build portable
        if: matrix.type == 'portable'
        shell: bash
        run: |
          pyinstaller --onefile \
            --noconsole \
            --name KemonoDownloader \
            src/kemonodownloader/app.py

          mkdir -p release

          mv dist/KemonoDownloader.exe \
            release/W-KemonoDownloader-${{ needs.prepare.outputs.version }}-Portable.exe

      # ========================
      # Briefcase build
      # ========================
      - name: Briefcase create/build
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m briefcase create
            python3 -m briefcase build
          else
            briefcase create
            briefcase build
          fi

      # ========================
      # Package
      # ========================
      - name: Package
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "${{ matrix.type }}" == "msi" ]]; then
            briefcase package
          elif [[ "${{ matrix.type }}" == "dmg" ]]; then
            briefcase package --adhoc-sign
          elif [[ "${{ matrix.type }}" == "deb" ]]; then
            python3 -m briefcase package -p deb
          elif [[ "${{ matrix.type }}" == "rpm" ]]; then
            python3 -m briefcase package -p rpm
          fi

      # ========================
      # Collect artifacts
      # ========================
      - name: Collect files
        shell: bash
        run: |
          mkdir -p release

          if [[ "${{ matrix.type }}" == "msi" ]]; then
            cp dist/*.msi release/

          elif [[ "${{ matrix.type }}" == "dmg" ]]; then
            cp dist/*.dmg release/

          elif [[ "${{ matrix.type }}" == "deb" ]]; then
            cp dist/*.deb release/

          elif [[ "${{ matrix.type }}" == "rpm" ]]; then
            cp dist/*.rpm release/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  release:
    needs: [prepare, build]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: KemonoDownloader v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
