name: Build & Release KemonoDownloader

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  # =========================
  # VERSION
  # =========================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install toml

      - id: version
        shell: bash
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['briefcase']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

  # =========================
  # BUILD MATRIX
  # =========================
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSI
          - os: windows-latest
            type: msi
            artifact: win-msi

          # Windows Portable
          - os: windows-latest
            type: portable
            artifact: win-portable

          # macOS ARM64
          - os: macos-latest
            type: dmg
            arch: arm64
            artifact: mac-arm64

          # macOS Intel
          - os: macos-13
            type: dmg
            arch: x86_64
            artifact: mac-intel

          # Linux DEB
          - os: ubuntu-latest
            type: deb
            artifact: linux-deb

          # Linux RPM (Ubuntu build)
          - os: ubuntu-latest
            type: rpm
            artifact: linux-rpm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # LINUX DEPENDENCIES
      # =========================
      - name: Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            build-essential pkg-config \
            libgtk-3-dev libcairo2-dev libglib2.0-dev \
            gir1.2-gtk-3.0 \
            libpulse0 libxcb-xinerama0 mesa-utils \
            rpm fakeroot

      # =========================
      # PYTHON SETUP
      # =========================
      - name: Install Python deps
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m pip install --break-system-packages -U pip
          else
            python -m pip install -U pip
          fi

          if [[ "${{ matrix.type }}" == "portable" ]]; then
            pip install pyinstaller toml
          else
            pip install briefcase toml PyQt6
          fi

      # =========================
      # PORTABLE BUILD
      # =========================
      - name: Build Portable
        if: matrix.type == 'portable'
        shell: bash
        run: |
          pyinstaller --onefile --noconsole \
            --name KemonoDownloader \
            src/kemonodownloader/app.py

          mkdir -p release
          mv dist/KemonoDownloader* release/

      # =========================
      # BRIEFCASE BUILD
      # =========================
      - name: Briefcase create/build
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m briefcase create
            python3 -m briefcase build
          else
            briefcase create
            briefcase build
          fi

      # =========================
      # PACKAGE
      # =========================
      - name: Package
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "${{ matrix.type }}" == "msi" ]]; then
            briefcase package

          elif [[ "${{ matrix.type }}" == "dmg" ]]; then
            briefcase package --adhoc-sign

          elif [[ "${{ matrix.type }}" == "deb" ]]; then
            python3 -m briefcase package -p deb

          elif [[ "${{ matrix.type }}" == "rpm" ]]; then
            python3 -m briefcase package -p rpm
          fi

      # =========================
      # COLLECT ARTIFACTS
      # =========================
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release

          find dist -type f -maxdepth 2 || true

          cp -r dist/* release/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  # =========================
  # RELEASE
  # =========================
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: KemonoDownloader v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
