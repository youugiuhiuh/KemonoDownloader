name: Build KemonoDownloader

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install toml
        run: |
          python -m pip install --upgrade pip
          pip install toml

      - name: Read version from pyproject.toml
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['tool']['briefcase']['version'])")

          if [ -z "$VERSION" ]; then
            echo "Version not found!"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

  build:
    needs: prepare

    strategy:
      fail-fast: false

      matrix:
        include:
          #################################################
          # Windows MSI
          #################################################

          - os: windows-latest
            platform: windows
            build_type: msi
            artifact_name: windows-msi

          #################################################
          # Windows Portable
          #################################################

          - os: windows-latest
            platform: windows
            build_type: portable
            artifact_name: windows-portable

          #################################################
          # macOS ARM64
          #################################################

          - os: macos-latest
            platform: macos
            build_type: dmg
            artifact_name: macos-arm64

          #################################################
          # macOS Intel
          #################################################

          - os: macos-13
            platform: macos
            build_type: dmg
            artifact_name: macos-x86_64

          #################################################
          # Linux DEB
          #################################################

          - os: ubuntu-latest
            platform: linux
            build_type: deb
            artifact_name: linux-deb

          #################################################
          # Linux RPM
          #################################################

          - os: ubuntu-latest
            platform: linux
            build_type: rpm
            artifact_name: linux-rpm

    runs-on: ${{ matrix.os }}

    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      #################################################
      # Setup Python
      #################################################

      - name: Setup Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      #################################################
      # Linux System Python
      #################################################

      - name: Install Linux system Python
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv \
            libgtk-3-dev \
            libglib2.0-dev \
            libgirepository1.0-dev \
            libcairo2-dev \
            gir1.2-gtk-3.0 \
            pkg-config \
            build-essential \
            rpm

      #################################################
      # Install Dependencies
      #################################################

      - name: Install dependencies
        shell: bash
        run: |
          echo "Runner OS: $RUNNER_OS"

          if [[ "$RUNNER_OS" == "Linux" ]]; then

            python3 -m pip install --break-system-packages --upgrade pip

            if [[ "${{ matrix.build_type }}" == "portable" ]]; then
              python3 -m pip install --break-system-packages \
                pyinstaller \
                toml \
                -r requirements.txt
            else
              python3 -m pip install --break-system-packages \
                briefcase \
                toml \
                PyQt6 \
                -r requirements.txt
            fi

          else

            python -m pip install --upgrade pip

            if [[ "${{ matrix.build_type }}" == "portable" ]]; then
              pip install pyinstaller toml -r requirements.txt
            else
              pip install briefcase toml PyQt6 -r requirements.txt
            fi

          fi

      #################################################
      # Fix PEP639 warning
      #################################################

      - name: Patch pyproject.toml for PEP639
        shell: bash
        run: |
          python << 'EOF'
          from pathlib import Path

          p = Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")

          if 'license-files' not in text:
              text = text.replace(
                  'license = { file = "LICENSE" }',
                  'license = "MIT"\nlicense-files = ["LICENSE"]'
              )

          p.write_text(text, encoding="utf-8")
          EOF

      #################################################
      # Windows Portable Build
      #################################################

      - name: Build Portable EXE
        if: matrix.build_type == 'portable'
        shell: bash
        run: |
          pyinstaller --onefile \
            --noconsole \
            --icon "assets/icons/KemonoDownloader.ico" \
            --add-data "src/kemonodownloader/resources/KemonoDownloader.png;resources/" \
            --collect-data fake_useragent \
            --distpath release \
            --workpath build \
            --name "KemonoDownloader" \
            src/kemonodownloader/app.py

          mv \
            release/KemonoDownloader.exe \
            release/W-KemonoDownloader-${{ needs.prepare.outputs.version }}-x86_64-Portable.exe

      #################################################
      # Briefcase Create
      #################################################

      - name: Briefcase create
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m briefcase create
          else
            briefcase create
          fi

      #################################################
      # Briefcase Build
      #################################################

      - name: Briefcase build
        if: matrix.build_type != 'portable'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m briefcase build
          else
            briefcase build
          fi

      #################################################
      # Package
      #################################################

      - name: Package MSI
        if: matrix.build_type == 'msi'
        shell: bash
        run: |
          briefcase package

      - name: Package DMG
        if: matrix.build_type == 'dmg'
        shell: bash
        run: |
          briefcase package --adhoc-sign

      - name: Package DEB
        if: matrix.build_type == 'deb'
        shell: bash
        run: |
          python3 -m briefcase package -p deb

      - name: Package RPM
        if: matrix.build_type == 'rpm'
        shell: bash
        run: |
          python3 -m briefcase package -p rpm

      #################################################
      # Prepare Release Files
      #################################################

      - name: Prepare release directory
        shell: bash
        run: |
          mkdir -p release

      - name: Prepare MSI
        if: matrix.build_type == 'msi'
        shell: bash
        run: |
          cp \
            dist/KemonoDownloader-${{ needs.prepare.outputs.version }}.msi \
            release/W-KemonoDownloader-${{ needs.prepare.outputs.version }}-x86_64.msi

      - name: Prepare macOS ARM64
        if: matrix.artifact_name == 'macos-arm64'
        shell: bash
        run: |
          cp \
            dist/KemonoDownloader-${{ needs.prepare.outputs.version }}.dmg \
            release/M-KemonoDownloader-${{ needs.prepare.outputs.version }}-arm64.dmg

      - name: Prepare macOS Intel
        if: matrix.artifact_name == 'macos-x86_64'
        shell: bash
        run: |
          cp \
            dist/KemonoDownloader-${{ needs.prepare.outputs.version }}.dmg \
            release/M-KemonoDownloader-${{ needs.prepare.outputs.version }}-x86_64.dmg

      - name: Prepare DEB
        if: matrix.build_type == 'deb'
        shell: bash
        run: |
          cp dist/*.deb release/

      - name: Prepare RPM
        if: matrix.build_type == 'rpm'
        shell: bash
        run: |
          cp dist/*.rpm release/

      #################################################
      # Upload Artifacts
      #################################################

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  #####################################################
  # Release
  #####################################################

  release:
    needs:
      - prepare
      - build

    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: |
          find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}

          name: KemonoDownloader v${{ needs.prepare.outputs.version }}

          generate_release_notes: true

          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
