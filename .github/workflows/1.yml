name: Build KemonoDownloader

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Read version
        id: version
        shell: bash
        # 使用 Python 3.12 内置的 tomllib，无需额外安装 toml 包
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['tool']['briefcase']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSI
          - os: windows-latest
            type: msi
            artifact: windows-msi
            arch: x86_64
          # Windows Portable
          - os: windows-latest
            type: portable
            artifact: windows-portable
            arch: x86_64
          # macOS Universal2
          - os: macos-latest
            type: dmg
            artifact: mac-universal
            arch: universal2
          # Linux DEB
          - os: ubuntu-latest
            type: deb
            artifact: linux-deb
            arch: x86_64
          # Linux RPM
          # GitHub Actions 没有 fedora-latest，使用 ubuntu-latest 配合安装 rpm 工具即可
          - os: ubuntu-latest
            type: rpm
            artifact: linux-rpm
            arch: x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ========================
      # Linux system deps
      # ========================
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            build-essential pkg-config \
            libgtk-3-dev libcairo2-dev libglib2.0-dev \
            gir1.2-gtk-3.0 \
            libpulse-mainloop-glib0 libpulse0 libxcb-xinerama0 mesa-utils \
            rpm fakeroot

      # ========================
      # Python dependencies
      # ========================
      - name: Install Python dependencies
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m pip install --break-system-packages --upgrade pip
            if [[ "${{ matrix.type }}" == "portable" ]]; then
              python3 -m pip install --break-system-packages pyinstaller
            else
              python3 -m pip install --break-system-packages briefcase PyQt6
            fi
          else
            python -m pip install --upgrade pip
            if [[ "${{ matrix.type }}" == "portable" ]]; then
              pip install pyinstaller
            else
              pip install briefcase PyQt6
            fi
          fi

      # ========================
      # Portable build
      # ========================
      - name: Build Windows portable
        if: matrix.type == 'portable'
        shell: bash
        run: |
          pyinstaller --onefile \
            --noconsole \
            --name KemonoDownloader \
            src/kemonodownloader/app.py

          mkdir -p release
          mv dist/KemonoDownloader.exe \
            release/W-KemonoDownloader-${{ needs.prepare.outputs.version }}-Portable.exe

      # ========================
      # Briefcase create/build
      # ========================
      - name: Briefcase create/build
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            python3 -m briefcase create
            python3 -m briefcase build
          else
            briefcase create
            briefcase build
          fi

      # ========================
      # Package
      # ========================
      - name: Package
        if: matrix.type != 'portable'
        shell: bash
        run: |
          if [[ "${{ matrix.type }}" == "msi" ]]; then
            briefcase package
          elif [[ "${{ matrix.type }}" == "dmg" ]]; then
            briefcase package -p dmg
          elif [[ "${{ matrix.type }}" == "deb" ]]; then
            python3 -m briefcase package -p deb
          elif [[ "${{ matrix.type }}" == "rpm" ]]; then
            python3 -m briefcase package -p rpm
          fi

      # ========================
      # Collect artifacts
      # ========================
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ matrix.type }}" == "msi" ]]; then
            cp dist/*.msi release/
          elif [[ "${{ matrix.type }}" == "dmg" ]]; then
            cp dist/*.dmg release/
            mv release/*.dmg release/M-KemonoDownloader-${{ needs.prepare.outputs.version }}-universal.dmg
          elif [[ "${{ matrix.type }}" == "deb" ]]; then
            cp dist/*.deb release/
          elif [[ "${{ matrix.type }}" == "rpm" ]]; then
            cp dist/*.rpm release/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: KemonoDownloader v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
